name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Least privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

# A newer push to the same ref cancels the older, still-running CI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.4'
          extensions: ctype, dom, fileinfo, filter, json, mbstring, openssl, pdo, pdo_sqlite, tokenizer, xml, xmlwriter
          coverage: none

      - name: Validate Composer files
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Composer security audit
        run: composer audit

      - name: Check PHP platform requirements
        run: composer check-platform-reqs

      - name: Run PHP style check
        run: vendor/bin/pint --test

      - name: Run PHP tests
        run: composer test

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root Node dependencies
        run: npm ci

      - name: Install frontend Node dependencies
        run: npm --prefix frontend ci

      - name: Root npm security audit
        run: npm audit --audit-level=high

      - name: Frontend npm security audit
        run: npm --prefix frontend audit --audit-level=high

      - name: Run frontend checks
        run: npm run check

      - name: Build assets
        run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Full history so pushes/PRs are scanned across their whole range.
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Personal/public repos need no license; org-owned private repos
          # require a (free) GITLEAKS_LICENSE - set it as a repo secret then.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
