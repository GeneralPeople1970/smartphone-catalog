name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Least privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

# A newer push to the same ref cancels the older, still-running CI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.5'
          extensions: ctype, dom, fileinfo, filter, json, mbstring, openssl, pdo, pdo_sqlite, tokenizer, xml, xmlwriter
          coverage: none

      - name: Validate Composer files
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Composer security audit
        run: composer audit

      - name: Check PHP platform requirements
        run: composer check-platform-reqs

      - name: Run PHP style check
        run: vendor/bin/pint --test

      - name: Run PHP tests
        run: composer test

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root Node dependencies
        run: npm ci

      - name: Install frontend Node dependencies
        run: npm --prefix frontend ci

      - name: Root npm security audit
        run: npm audit --audit-level=high

      - name: Frontend npm security audit
        run: npm --prefix frontend audit --audit-level=high

      - name: Run frontend checks
        run: npm run check

      - name: Build assets
        run: npm run build

  # Runs the PHPUnit suite against a real MySQL 8 service, so migrations and the
  # permission/owner invariants are exercised on the production database engine,
  # not only SQLite.
  mysql-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laravel_test
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.5'
          extensions: ctype, dom, fileinfo, filter, json, mbstring, openssl, pdo, pdo_mysql, tokenizer, xml, xmlwriter
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations on MySQL
        run: php artisan migrate --force

      - name: Run PHP tests against MySQL (fulltext search driver)
        run: vendor/bin/phpunit
        env:
          CATALOG_SEARCH_DRIVER: fulltext

  # Builds the deployment images, then tests the same image-only Compose file
  # used on production hosts. Its one-shot migration must complete before app
  # startup; /up exercises nginx -> php-fpm -> MySQL.
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Create deployment .env
        run: |
          cp .env.docker.example .env
          # Deterministic non-secret values for CI only.
          sed -i 's|^APP_URL=.*|APP_URL=http://localhost:8080|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=ci-db-pass|' .env
          sed -i 's|^DB_ROOT_PASSWORD=.*|DB_ROOT_PASSWORD=ci-root-pass|' .env
          sed -i 's|^SESSION_SECURE_COOKIE=.*|SESSION_SECURE_COOKIE=false|' .env

      - name: Build images
        run: |
          docker compose build
          # The deployment smoke test uses --pull never so it cannot silently
          # substitute a registry app image for the images built just above.
          docker pull mysql:8.0

      - name: Generate APP_KEY
        run: |
          KEY=$(docker compose run --rm --no-deps app php artisan key:generate --show)
          sed -i "s|^APP_KEY=.*|APP_KEY=${KEY}|" .env

      - name: Validate image-only deployment Compose
        run: |
          DOCKER_APP_IMAGE=smartphone-catalog-app:latest \
          DOCKER_WEB_IMAGE=smartphone-catalog-web:latest \
          docker compose -f compose.deploy.yml config --quiet

      - name: Deploy images and apply migrations in one command
        run: |
          DOCKER_APP_IMAGE=smartphone-catalog-app:latest \
          DOCKER_WEB_IMAGE=smartphone-catalog-web:latest \
          docker compose -f compose.deploy.yml up -d --pull never --wait --wait-timeout 180

      - name: Show deployment diagnostics
        if: failure()
        run: |
          docker compose -f compose.deploy.yml ps --all
          docker compose -f compose.deploy.yml logs --no-color

      - name: Smoke-test /up through nginx
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/up || true)
            echo "attempt $i -> $code"
            if [ "$code" = "200" ]; then
              echo "health check passed"
              exit 0
            fi
            sleep 3
          done
          echo "::error::/up did not return 200 in time"
          docker compose -f compose.deploy.yml logs --no-color | tail -100
          exit 1

      - name: Tear down
        if: always()
        run: docker compose -f compose.deploy.yml down -v

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history so pushes/PRs are scanned across their whole range.
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Personal/public repos need no license; org-owned private repos
          # require a (free) GITLEAKS_LICENSE - set it as a repo secret then.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
