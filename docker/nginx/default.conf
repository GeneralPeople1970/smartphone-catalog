# Nginx vhost for the smartphone catalog (container deployment).
# Mirrors docs/DEVELOPMENT.md "Nginx 示例", adapted to php-fpm at app:9000.
# TLS terminates at your outer load balancer / reverse proxy in this setup.

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Slightly above the app's 20M upload cap so the app returns the friendly
    # validation error instead of Nginx a raw 413.
    client_max_body_size 22m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hidden files (allow ACME well-known).
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # User uploads: served from the shared volume; scripts must never execute.
    # This block must precede the generic /storage alias and the php handler.
    location ~* ^/storage/.*\.(php[0-9]?|pht|phtml|phps|phar|pl|py|cgi|sh|shtml)$ {
        deny all;
    }

    # Uploads live on the shared "uploads" volume, mounted at the same path in
    # this container — no reliance on the public/storage symlink.
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # Hashed build artifacts are content-addressed: cache forever.
    location ~* ^/(build|frontend)/.*\.(css|js|mjs|woff2?)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Exclude /storage/: regex locations take precedence over the alias prefix
    # and would otherwise look for uploaded images under public/storage.
    location ~* ^/(?!storage/).*\.(jpg|jpeg|png|webp|gif|svg|ico|woff2?)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_pass app:9000;
        fastcgi_hide_header X-Powered-By;
    }
}
