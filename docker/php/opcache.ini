; Production OPcache settings. validate_timestamps=0 assumes an immutable image
; (application code never changes at runtime); rebuild the image to deploy new
; code. If you bind-mount code for development, set validate_timestamps=1.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=192
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.save_comments=1
opcache.fast_shutdown=1
